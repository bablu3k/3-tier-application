apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres

spec:
  serviceName: postgres-service

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres

        image: postgres:15

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: appdb

        - name: POSTGRES_USER
          value: appuser

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          
        volumes: 
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
            
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage

    spec:
      accessModes:
      - ReadWriteOnce

      resources:
        requests:
          storage: 10Gi
    