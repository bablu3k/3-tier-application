apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: three-tier-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/your-org/three-tier-gitops.git
    targetRevision: main
    path: helm/three-tier

  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true