apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: three-tier-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/your-org/three-tier-gitops.git

    targetRevision: main

    path: helm/three-tier

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc

    namespace: three-tier

  syncPolicy:

    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true

    retry:
      limit: 5

      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m