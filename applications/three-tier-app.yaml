apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: three-tier-app
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/bablu3k/3-tier-application.git
    targetRevision: main
    path: helm/three-tier
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier-1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true